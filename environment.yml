# GPU(CUDA)環境用の mamba/conda 定義。
#
# 方針: geoopt 以外はすべて conda-forge から入れる。こうすると libstdc++/CUDA が
#       環境内で一貫して解決され、古い OS の /lib64/libstdc++ を掴んで
#       `CXXABI_x.x.x not found` になる問題が起きない（pip の torch と混ぜると壊れやすい）。
#
# 作り直しの手順（既存 env がある場合）:
#   mamba deactivate
#   mamba env remove -n hypsimcse
#   mamba env create -f environment.yml
#   mamba activate hypsimcse
#   pip install -e . --no-deps        # hypsimcse 本体だけ editable 導入（依存は conda 済み）
#   python scripts/download_data.py   # WordNet + STS-B
#   pytest -q                         # 全69テスト確認
name: hypsimcse
channels:
  - conda-forge
dependencies:
  - python=3.12
  # --- PyTorch(GPU) を conda-forge から。CUDA ランタイムも conda が用意する ---
  # パッケージ名は "pytorch"。build を cuda* に固定して CUDA ビルドを強制する
  # （動作実績のある環境と同じ入れ方。pytorch-gpu という名前は使わない）。
  - pytorch=*=cuda*
  # - cuda-version=13       # ドライバに合わせて CUDA を固定したい時だけ有効化
  # CPU only にしたい場合は上を  - pytorch=*=cpu*  に変更
  # --- 科学計算・ML 系（すべて conda-forge） ---
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib-base>=3.7
  - pyyaml>=6.0
  - tqdm>=4.66
  - transformers>=4.40
  - datasets>=2.14
  - nltk>=3.8
  - pytest>=7.0
  # --- conda-forge に無いものだけ pip ---
  - pip
  - pip:
      - geoopt>=0.5         # Riemannian Adam（比較用）。純Pythonなので混在しても安全
